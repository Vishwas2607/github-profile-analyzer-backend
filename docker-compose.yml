services:
  api:

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "5000:5000"

    depends_on:
      - mysql

    environment:
      Node_ENV: production

    env_file:
      - .env

    restart: unless-stopped

  mysql:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: github_analyzer

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  mysql_data: