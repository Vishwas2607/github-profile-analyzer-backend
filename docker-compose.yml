services:
  api:

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "5000:5000"

    depends_on:
      - mysql

    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: github_analyzer
      DB_SSL: false
      DB_PORT: 3306

    restart: unless-stopped

  mysql:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: github_analyzer

    ports:
      - "127.0.0.1:3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  mysql_data: